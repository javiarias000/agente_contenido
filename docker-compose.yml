version: '3.8'

services:
  backend:
    build: .
    container_name: agente-contenido-backend
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app/api
      - ./skills:/app/skills
      - ./outputs:/app/outputs
      - ./brands:/app/brands
      - ./logs:/app/logs
      - ./.env:/app/.env
      - ./assemble_video.py:/app/assemble_video.py
      - ./fix_audio_and_assemble.py:/app/fix_audio_and_assemble.py
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite+aiosqlite:///./agente_contenido.db
      - DASHBOARD_URL=http://localhost:3000
    command: >
      uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/api
      --reload-dir /app/skills
    restart: unless-stopped
    networks:
      - agente-network

  frontend:
    image: node:22-alpine
    container_name: agente-contenido-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./dashboard:/app
      - frontend_modules:/app/node_modules
      - frontend_next:/app/.next
    environment:
      - FASTAPI_URL=http://backend:8000
      - NEXT_PUBLIC_API_BASE=/api-proxy
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - agente-network

networks:
  agente-network:
    driver: bridge

volumes:
  frontend_modules:
  frontend_next:
